name: Build & Release

defaults:
  run:
    shell: bash

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Install 7z
        run: apt-get update -qq && apt-get install -y p7zip-full

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Build common library
        run: make -C common -j$(nproc)

      - name: Build distribution package
        run: make dist -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fizeau
          path: out/Fizeau.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Запускается только при пуше тега v* — пользователь создаёт тег вручную:
    #   git tag v2.9.2 && git push origin v2.9.2
    # Если релиз с этим тегом уже существует — файлы перезаписываются.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Fizeau

      - name: Publish (create or overwrite) release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fizeau ${{ github.ref_name }}
          generate_release_notes: true
          files: Fizeau.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
