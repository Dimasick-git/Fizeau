name: Build & Release

defaults:
  run:
    shell: bash

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Install 7z
        run: apt-get update -qq && apt-get install -y p7zip-full

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Build common library
        run: make -C common -j$(nproc)

      - name: Build distribution package
        run: make dist -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fizeau
          path: out/Fizeau.zip
          if-no-files-found: error

  release:
    name: Publish release if APP_VERSION changed
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Fizeau

      - name: Resolve target tag and check if release exists
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APP_VERSION=$(grep -E '^APP_VERSION\s*:=' overlay/Makefile | sed -E 's/.*:=\s*//;s/\s*$//')
          if [ -z "$APP_VERSION" ]; then
            echo "::error::Could not extract APP_VERSION."
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${APP_VERSION}"
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish: $TAG"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create & push tag
        if: steps.tag.outputs.should_release == 'true' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name  'ryazhahand-release-bot'
            git config user.email 'ryazhahand-release-bot@users.noreply.github.com'
            git tag -a "$TAG" -m "Auto-release on APP_VERSION change: $TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub Release
        if: steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Fizeau ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: Fizeau.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
