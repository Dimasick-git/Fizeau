name: Build & Release

defaults:
  run:
    shell: bash

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Install 7z
        run: apt-get update -qq && apt-get install -y p7zip-full

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Build common library
        run: make -C common -j$(nproc)

      - name: Build distribution package
        run: make dist -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fizeau
          path: out/Fizeau.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Fizeau

      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On tag push — use the tag directly
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "need_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On main push — read version from Makefile
          VERSION=$(grep -E '^export FZ_VERSION\s*=' Makefile \
            | sed -E 's/^export FZ_VERSION\s*=\s*//' | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Check if tag already exists on remote
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — will overwrite release files."
            echo "need_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "New tag: $TAG"
            echo "need_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag.outputs.need_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use token in remote URL — this fixes 'fatal error in commit_refs'
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Fizeau ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: Fizeau.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
